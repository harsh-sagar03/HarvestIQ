services:
  - type: web
    name: harvestiq-engine
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: harvestiq
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEMO_ENABLED
        value: "true"
